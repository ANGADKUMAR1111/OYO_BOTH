spring:
  application:
    name: oyo-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-mute-grass-a1ea8ezq.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_wAMuex8cK7Zg}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        enable_lazy_load_no_trans: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:angadkushwaha190270@gmail.com}
    password: ${MAIL_PASSWORD:nafzwocogqyhsxic}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Kolkata
    deserialization:
      fail-on-unknown-properties: false

  cache:
    type: simple

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:oyoHotelBookingSecretKey2024VeryLongAndSecureKeyForJWTSigningAtLeast256Bits}
  expiration: 86400000 # 24 hours in ms
  refresh-expiration: 604800000 # 7 days in ms

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dqvschews}
  api-key: ${CLOUDINARY_API_KEY:887363173919633}
  api-secret: ${CLOUDINARY_API_SECRET:MMcZrYDpy8xXgKVAc4YOGio_gf8}

# Razorpay
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_ScVrmQ2ipATnS4}
  key-secret: ${RAZORPAY_KEY_SECRET:oGpMpQ0Hka1dGU6hWzZMx5fi}
  currency: INR

# Firebase
firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}

# OTP
otp:
  expiry-minutes: 10
  length: 6

# Application
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-email: ${ADMIN_EMAIL:angadkumar1860053@gmail.com}

# SpringDoc/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.oyo: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
